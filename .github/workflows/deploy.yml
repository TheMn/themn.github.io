name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Inject secrets into config
        env:
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CONTACT_URL: ${{ secrets.CONTACT_SCRIPT_URL }}
        run: |
          sed -i "s|UNSPLASH_KEY_PLACEHOLDER|${UNSPLASH_KEY}|g" _config.yml
          sed -i "s|CONTACT_URL_PLACEHOLDER|${CONTACT_URL}|g" _config.yml

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
