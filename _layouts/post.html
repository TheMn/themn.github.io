---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>

<!-- Giscus comments -->
{% if site.giscus_repo_id and site.giscus_repo_id != "" %}
<div class="giscus-wrapper">
  <script src="https://giscus.app/client.js"
    data-repo="themn/themn.github.io"
    data-repo-id="{{ site.giscus_repo_id }}"
    data-category="{{ site.giscus_category }}"
    data-category-id="{{ site.giscus_category_id }}"
    data-mapping="title"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="light"
    data-lang="en"
    crossorigin="anonymous"
    async>
  </script>
</div>
{% else %}
<div class="giscus-wrapper" style="color:#888;font-size:0.85rem;">
  <p>Comments are not configured yet. See <code>_config.yml</code> for Giscus setup instructions.</p>
</div>
{% endif %}
